<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>环评与清洁生产工艺图高级编辑工具</title>
    <script src="https://fastly.jsdelivr.net/npm/@antv/x6@1.34.6/dist/x6.js"></script>
    <script src="https://fastly.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
    <style>
        body { font-family: 'Microsoft YaHei', sans-serif; margin: 0; padding: 0; display: flex; height: 100vh; background: #f0f2f5; }
        .sidebar { width: 320px; background: #fff; padding: 20px; box-shadow: 2px 0 8px rgba(0,0,0,0.1); display: flex; flex-direction: column; z-index: 10; }
        .sidebar h3 { margin-top: 0; font-size: 16px; color: #333; }
        textarea { flex: 1; resize: none; border: 1px solid #d9d9d9; border-radius: 4px; padding: 10px; font-family: monospace; font-size: 12px; margin-bottom: 10px; }
        
        .btn { background: #1890ff; color: #fff; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 8px; text-align: center; font-size: 13px;}
        .btn:hover { background: #40a9ff; }
        .btn-green { background: #52c41a; }
        .btn-green:hover { background: #73d13d; }
        .btn-orange { background: #fa8c16; }
        .btn-orange:hover { background: #ffaa40; }

        /* 顶部高级样式工具栏 */
        .toolbar { position: absolute; top: 20px; left: 360px; background: #fff; padding: 12px 20px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.15); display: flex; gap: 15px; align-items: center; z-index: 10; display: none; border: 1px solid #d9d9d9; }
        .toolbar label { font-size: 13px; color: #55px; display: flex; align-items: center; gap: 4px; }
        .toolbar input[type="text"] { width: 140px; padding: 4px; border: 1px solid #ccc; border-radius: 4px; }
        .toolbar input[type="number"] { width: 45px; padding: 4px; border: 1px solid #ccc; border-radius: 4px; }
        .toolbar select { padding: 4px; border: 1px solid #ccc; border-radius: 4px; }
        
        #container-wrapper { flex: 1; height: 100%; position: relative; background: #fafafa; }
        #container { width: 100%; height: 100%; }
        
        .tip { font-size: 12px; color: #888; margin-bottom: 10px; line-height: 1.5; }
        .status-bar { padding: 10px; background: #fffbe6; border: 1px solid #ffe58f; color: #d46b08; font-size: 12px; border-radius: 4px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<div class="sidebar">
    <h3>1. 数据输入区 (JSON)</h3>
    <div id="statusAlert" class="status-bar"></div>
    <textarea id="jsonInput" placeholder="在此粘贴 AI 生成的数据..."></textarea>
    
    <button class="btn" onclick="renderFromJSON()">自动生成基础流程图</button>
    <button class="btn btn-orange" onclick="addCustomTextNode()">＋ 画布中新增文本框</button>
    <button class="btn btn-green" onclick="exportPNG()">导出高清晰度图片 (PNG)</button>
    
    <div class="tip" style="margin-top:15px; border-top: 1px solid #eee; padding-top: 15px;">
        <b>💡 高级画图微调指南：</b><br>
        1. <b>自动对齐</b>：拖动任意方框时，系统会弹出<b>动态对齐辅助线</b>，帮助你完美对齐上下左右。<br>
        2. <b>修改文字与样式</b>：点击画布中的任何方框，顶部会弹出属性面板，可直接<b>重写文字、换字体、加粗、隐藏边框</b>。<br>
        3. <b>自由连线</b>：鼠标移动到方框边缘会出现圆点，拖拽圆点到另一个方框即可手动拉出新连线。<br>
        4. <b>删除元素</b>：选中不需要的方框或线条，按键盘 <b>Delete</b> 键即可删除。
    </div>
</div>

<div id="container-wrapper">
    <div class="toolbar" id="toolbar">
        <span style="font-size: 13px; font-weight: bold; color: #1890ff; margin-right: 5px;">样式配置面板:</span>
        <label>修改文字: <input type="text" id="nodeLabel" oninput="updateNodeStyle('label', this.value)"></label>
        <label>中西字体: 
            <select id="fontFamily" onchange="updateNodeStyle('fontFamily', this.value)">
                <option value="Microsoft YaHei">微软雅黑 (推荐中文)</option>
                <option value="SimSun">宋体 (标准报告)</option>
                <option value="SimHei">黑体</option>
                <option value="Arial">Arial (推荐西文)</option>
                <option value="Times New Roman">Times New Roman</option>
            </select>
        </label>
        <label>字号: <input type="number" id="fontSize" value="13" onchange="updateNodeStyle('fontSize', this.value)"></label>
        <label><input type="checkbox" id="fontWeight" onchange="updateNodeStyle('fontWeight', this.checked)"><b>文本加粗</b></label>
        <label><input type="checkbox" id="showBorder" checked onchange="updateNodeStyle('showBorder', this.checked)">显示边框</label>
        <label>填充背景: <input type="color" id="bgColor" onchange="updateNodeStyle('fill', this.value)"></label>
        <label>边框颜色: <input type="color" id="strokeColor" onchange="updateNodeStyle('stroke', this.value)"></label>
    </div>
    <div id="container"></div>
</div>

<script>
    function showError(msg) {
        const alertBox = document.getElementById('statusAlert');
        alertBox.style.display = 'block';
        alertBox.innerHTML = `⚠️ ${msg}`;
    }

    window.onload = function() {
        if (typeof X6 === 'undefined' || typeof dagre === 'undefined') {
            showError("绘图引擎加载失败，请检查网络。");
            return;
        }
        initGraph();
    };

    let graph;
    let activeNode = null;

    function initGraph() {
        try {
            graph = new X6.Graph({
                container: document.getElementById('container'),
                grid: { size: 10, visible: true, type: 'dot', args: { color: '#e0e0e0', thickness: 1 } },
                panning: true,
                // 【新增核心功能】开启智能对齐辅助线，实现拖拽自动对齐
                snapline: {
                    enabled: true,
                    sharp: true, // 准确定位
                },
                mousewheel: { enabled: true, zoomAtMousePosition: true, modifiers: 'ctrl', minScale: 0.2, maxScale: 3 },
                connecting: {
                    snap: true,
                    allowBlank: false,
                    allowLoop: false,
                    highlight: true,
                    createEdge() { 
                        return new X6.Shape.Edge({ 
                            attrs: { line: { stroke: '#555', strokeWidth: 2, targetMarker: 'block' } } 
                        }); 
                    }
                },
                keyboard: { enabled: true }
            });

            // 键盘删除键绑定
            graph.bindKey(['delete', 'backspace'], () => {
                const cells = graph.getSelectedCells();
                if (cells.length) { graph.removeCells(cells); hideToolbar(); }
            });

            // 节点点击：提取当前节点的所有样式状态，填充到顶部控制面板
            graph.on('node:click', ({ node }) => {
                activeNode = node;
                const toolbar = document.getElementById('toolbar');
                toolbar.style.display = 'flex';
                
                const attrs = node.getAttrs();
                document.getElementById('nodeLabel').value = attrs.text.text || '';
                document.getElementById('fontFamily').value = attrs.text.fontFamily || 'Microsoft YaHei';
                document.getElementById('fontSize').value = attrs.text.fontSize || 13;
                document.getElementById('fontWeight').checked = attrs.text.fontWeight === 'bold';
                
                // 判断边框是否显示
                const hasBorder = attrs.body.strokeWidth !== 0 && attrs.body.stroke !== 'transparent';
                document.getElementById('showBorder').checked = hasBorder;
                
                document.getElementById('bgColor').value = attrs.body.fill || '#ffffff';
                document.getElementById('strokeColor').value = attrs.body.stroke || '#333333';
                
                graph.getNodes().forEach(n => n.attr('body/strokeWidth', n.id === node.id ? 3 : (n.attr('body/strokeWidth') === 0 ? 0 : 2)));
            });

            graph.on('blank:click', () => {
                activeNode = null;
                hideToolbar();
                graph.getNodes().forEach(n => {
                    if (n.attr('body/strokeWidth') === 3) n.attr('body/strokeWidth', 2);
                });
            });

        } catch (error) {
            showError("画布初始化失败: " + error.message);
        }
    }

    function hideToolbar() { document.getElementById('toolbar').style.display = 'none'; }

    // 【新增功能】全面支持字体、加粗、文字重写、隐藏边框的控制逻辑
    window.updateNodeStyle = function(type, value) {
        if (!activeNode) return;
        if (type === 'label') activeNode.attr('text/text', value);
        if (type === 'fill') activeNode.attr('body/fill', value);
        if (type === 'stroke') activeNode.attr('body/stroke', value);
        if (type === 'fontSize') activeNode.attr('text/fontSize', parseInt(value));
        if (type === 'fontFamily') activeNode.attr('text/fontFamily', value);
        if (type === 'fontWeight') activeNode.attr('text/fontWeight', value ? 'bold' : 'normal');
        if (type === 'showBorder') {
            // 如果不显示边框，将线条粗细设为0
            activeNode.attr('body/strokeWidth', value ? 2 : 0);
            if(!value) activeNode.attr('body/stroke', 'transparent');
            else activeNode.attr('body/stroke', document.getElementById('strokeColor').value);
        }
    };

    // 【新增功能】允许用户在画布中动态添加全新的自定义文本框/纯文字
    window.addCustomTextNode = function() {
        if (!graph) return;
        const newNode = graph.addNode({
            x: 150,
            y: 150,
            width: 140,
            height: 40,
            attrs: {
                body: { fill: '#ffffff', stroke: '#1890ff', strokeWidth: 2, rx: 4, ry: 4 },
                text: { text: '双击或在上方修改文字', fill: '#333333', fontSize: 13, fontFamily: 'Microsoft YaHei' }
            }
        });
        graph.scrollToCell(newNode);
    };

    window.renderFromJSON = function() {
        if (!graph) return alert("画布未就绪！");

        document.getElementById('statusAlert').style.display = 'none';
        let jsonStr = document.getElementById('jsonInput').value;
        jsonStr = jsonStr.replace(/```json/gi, '').replace(/```/g, '').trim();

        if (!jsonStr) return showError("请输入 JSON 数据");

        let data;
        try { data = JSON.parse(jsonStr); } catch (e) { return showError("JSON 格式错误，请检查括号与逗号！"); }

        try {
            graph.clearCells();
            hideToolbar();

            const g = new dagre.graphlib.Graph();
            g.setGraph({ rankdir: 'TB', nodesep: 40, ranksep: 60 });
            g.setDefaultEdgeLabel(() => ({}));

            const styleMap = {
                process: { width: 150, height: 45, fill: '#f9f9f9', stroke: '#333333', rx: 0 },
                material: { width: 140, height: 40, fill: '#ffffff', stroke: '#333333', rx: 20 },
                emission: { width: 150, height: 40, fill: '#fff1f0', stroke: '#ff4d4f', rx: 0, fontColor: '#d9363e' }
            };

            data.nodes.forEach(node => {
                const style = styleMap[node.category] || styleMap['process'];
                g.setNode(node.id, { width: style.width, height: style.height, ...style, label: node.label });
            });

            if(data.edges) { data.edges.forEach(edge => { g.setEdge(edge.source, edge.target); }); }

            dagre.layout(g);

            g.nodes().forEach(v => {
                const nodeMeta = g.node(v);
                if(!nodeMeta) return;
                graph.addNode({
                    id: v,
                    x: nodeMeta.x, y: nodeMeta.y,
                    width: nodeMeta.width, height: nodeMeta.height,
                    attrs: {
                        body: { fill: nodeMeta.fill, stroke: nodeMeta.stroke, strokeWidth: 2, rx: nodeMeta.rx, ry: nodeMeta.rx },
                        text: { text: nodeMeta.label, fill: nodeMeta.fontColor || '#333', fontSize: 13, fontFamily: 'Microsoft YaHei' }
                    }
                });
            });

            if(data.edges) {
                data.edges.forEach(edge => {
                    graph.addEdge({
                        source: { cell: edge.source },
                        target: { cell: edge.target },
                        attrs: {
                            line: {
                                stroke: edge.type === 'dashed' ? '#ff4d4f' : '#555555',
                                strokeWidth: 2,
                                strokeDasharray: edge.type === 'dashed' ? '5 5' : '0',
                                targetMarker: 'block',
                            }
                        }
                    });
                });
            }
            graph.centerContent({ padding: 50 });
        } catch (err) { showError("渲染出错: " + err.message); }
    };

    window.exportPNG = function() {
        if (!graph || graph.getCells().length === 0) return alert("画布为空！");
        graph.toPNG((dataUri) => {
            const link = document.createElement('a');
            link.download = '规范工艺流程图.png';
            link.href = dataUri;
            link.click();
        }, { padding: 30, backgroundColor: '#fff' });
    };
</script>

</body>
</html>
